<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1928;
  --surface2: #252438;
  --border: rgba(255,255,255,0.08);
  --accent: #e8a045;
  --accent2: #8b5cf6;
  --text: #fffffe;
  --text-muted: rgba(255,255,255,0.5);
  --red: #e85d5d;
  --green: #4ade80;
  --radius: 16px;
  --header-h: 60px;
  --nav-h: calc(64px + env(safe-area-inset-bottom));
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
h1,h2,h3,.num{font-family:'Playfair Display',serif}

/* OFFLINE BANNER */
#offline-banner{
  display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
  background:#b45309;color:#fff;text-align:center;padding:8px 16px;
  font-size:13px;font-weight:500;
}
#offline-banner.visible{display:block}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--header-h)}
header{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:100;
}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent)}
.logo span{color:var(--text-muted);font-size:11px;display:block;font-family:'DM Sans',sans-serif;font-weight:300;letter-spacing:0.15em;text-transform:uppercase;margin-top:-2px}
#lang-select{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:8px 12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;min-height:44px;
}

/* BOTTOM NAV */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  padding-bottom:env(safe-area-inset-bottom);z-index:100;
  -webkit-overflow-scrolling:touch;
}
#bottom-nav::-webkit-scrollbar{display:none}
.nav-btn{
  flex:0 0 auto;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:10px 16px;min-width:64px;
  border:none;background:none;color:var(--text-muted);font-size:10px;
  font-family:'DM Sans',sans-serif;cursor:pointer;transition:color 0.2s;
  min-height:44px;
}
.nav-btn .icon{font-size:20px;line-height:1}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{background:rgba(255,255,255,0.05)}

/* CONTENT */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--nav-h);-webkit-overflow-scrolling:touch}
.screen{display:none;padding:16px;animation:fadeIn 0.2s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-title{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:10px}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--accent)}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}

/* PROGRESS BAR */
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width 0.4s ease}

/* SKILL BARS */
.skill-bar-wrap{margin-bottom:10px}
.skill-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.skill-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.skill-fill{height:100%;border-radius:3px;transition:width 0.5s ease}

/* TABS */
.tab-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;margin-bottom:14px;padding-bottom:2px}
.tab-bar::-webkit-scrollbar{display:none}
.tab-pill{
  flex:0 0 auto;padding:8px 14px;border-radius:20px;border:1px solid var(--border);
  background:none;color:var(--text-muted);font-size:13px;font-family:'DM Sans',sans-serif;
  cursor:pointer;white-space:nowrap;min-height:36px;transition:all 0.15s;
}
.tab-pill.active{background:var(--accent);color:#0f0e17;border-color:var(--accent);font-weight:600}
.tab-pill:active{transform:scale(0.96)}

/* PHRASE CARD */
.phrase-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;
}
.phrase-native{font-size:20px;font-weight:600;margin-bottom:4px;line-height:1.3}
.phrase-roman{font-size:13px;color:var(--accent);margin-bottom:3px}
.phrase-english{font-size:13px;color:var(--text-muted)}
.phrase-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:10px;border:none;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  min-height:44px;transition:all 0.15s;
}
.btn:active{transform:scale(0.97)}
.btn-accent{background:var(--accent);color:#0f0e17}
.btn-accent2{background:var(--accent2);color:#fff}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:7px 12px;font-size:12px;min-height:36px;border-radius:8px}
.btn-full{width:100%}

/* INPUTS */
.input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:12px 14px;border-radius:10px;font-family:'DM Sans',sans-serif;
  font-size:15px;min-height:44px;outline:none;
}
.input:focus{border-color:var(--accent2)}
textarea.input{resize:vertical;min-height:80px;padding:12px 14px}

/* SPEAK SCREEN */
.phrase-big{
  font-family:'Playfair Display',serif;font-size:28px;font-weight:700;
  text-align:center;line-height:1.3;margin-bottom:8px;
}
.phonetic{font-size:14px;color:var(--accent);text-align:center;margin-bottom:6px}
.translation{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:20px}

/* COACH */
.chat-container{display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.chat-bubble{max-width:82%;padding:12px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.chat-bubble.coach{
  background:var(--surface2);border:1px solid var(--border);align-self:flex-start;
  border-bottom-left-radius:4px;
}
.chat-bubble.user{
  background:var(--accent2);color:#fff;align-self:flex-end;
  border-bottom-right-radius:4px;
}
.bubble-translation{font-size:11px;color:var(--text-muted);margin-top:5px;font-style:italic}
.coach-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.coach-avatar{width:44px;height:44px;border-radius:50%;background:var(--accent2);display:flex;align-items:center;justify-content:center;font-size:22px}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:5px}

/* CURRENCY */
.rate-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.rate-positive{color:var(--green)}
.rate-negative{color:var(--red)}
.quick-amounts{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.amount-btn{padding:8px 14px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;min-height:36px}
.amount-btn:active{background:var(--surface);color:var(--accent)}

/* VISUAL TRANSLATE */
.img-preview{width:100%;border-radius:12px;object-fit:cover;max-height:240px;margin:10px 0}
.camera-zone{
  border:2px dashed var(--border);border-radius:14px;padding:32px 20px;
  text-align:center;cursor:pointer;transition:border-color 0.2s;
}
.camera-zone:active{border-color:var(--accent)}

/* ACHIEVEMENTS */
.achievements{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.achievements::-webkit-scrollbar{display:none}
.achievement{flex:0 0 auto;text-align:center;width:80px}
.achievement-icon{width:56px;height:56px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 6px}
.achievement.unlocked .achievement-icon{border-color:var(--accent);background:rgba(232,160,69,0.1)}
.achievement-name{font-size:10px;color:var(--text-muted);line-height:1.3}

/* STREAK */
.streak-dots{display:flex;justify-content:space-between;gap:6px}
.streak-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)}
.streak-dot{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px}
.streak-dot.done{background:var(--accent);border-color:var(--accent);color:#0f0e17}
.streak-dot.today{border-color:var(--accent)}

/* HEATMAP */
.heatmap{display:grid;grid-template-columns:repeat(14,1fr);gap:3px;margin-top:8px}
.heat-cell{aspect-ratio:1;border-radius:3px;background:var(--surface2)}
.heat-1{background:rgba(232,160,69,0.25)}
.heat-2{background:rgba(232,160,69,0.5)}
.heat-3{background:rgba(232,160,69,0.75)}
.heat-4{background:var(--accent)}

/* EMERGENCY */
.emergency-overlay{
  position:fixed;inset:0;z-index:200;background:rgba(15,14,23,0.97);
  overflow-y:auto;padding:20px 16px;display:none;
}
.emergency-overlay.open{display:block}
.sos-btn{
  position:fixed;bottom:calc(var(--nav-h) + 14px);right:16px;
  width:56px;height:56px;border-radius:50%;background:var(--red);
  border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;
  z-index:99;box-shadow:0 4px 20px rgba(232,93,93,0.4);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Sans',sans-serif;
}
.sos-btn:active{transform:scale(0.95)}

/* CHAR KEYBOARD */
.char-keyboard{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 12px}
.char-key{
  padding:8px 10px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);
  color:var(--text);font-size:16px;cursor:pointer;min-height:40px;min-width:40px;
  text-align:center;font-family:'DM Sans',sans-serif;
}
.char-key:active{background:var(--surface);color:var(--accent)}

/* TRANSLATE SCREEN */
.lang-selectors{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.lang-selectors select{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;min-height:44px}
.swap-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:44px;height:44px;border-radius:10px;cursor:pointer;font-size:18px;flex:0 0 44px;display:flex;align-items:center;justify-content:center}
.swap-btn:active{background:var(--surface)}

/* RECORDING */
.record-btn{
  width:72px;height:72px;border-radius:50%;background:var(--accent2);border:none;
  color:#fff;font-size:28px;cursor:pointer;margin:0 auto;display:flex;
  align-items:center;justify-content:center;transition:all 0.15s;
}
.record-btn.recording{background:var(--red);animation:pulse 1s infinite}
.record-btn:active{transform:scale(0.95)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,93,93,0.5)}50%{box-shadow:0 0 0 14px rgba(232,93,93,0)}}

/* SPINNER */
.spinner{width:24px;height:24px;border:3px solid rgba(255,255,255,0.15);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT CARD */
.result-section{margin-bottom:10px}
.result-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.result-text{font-size:15px;line-height:1.6}

/* CANVAS WRAP */
.chart-wrap{position:relative;height:180px;margin:8px 0}

/* MILESTONES */
.milestone{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.milestone-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 40px}
.milestone.done .milestone-icon{background:rgba(232,160,69,0.15);border:1px solid var(--accent)}

/* SESSION HISTORY */
.session-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.score-badge{background:var(--surface2);padding:3px 8px;border-radius:6px;font-size:12px;font-weight:600;color:var(--accent)}

/* DESKTOP */
@media(min-width:768px){
  :root{--header-h:0px;--nav-h:0px}
  #offline-banner{left:260px}
  body{display:flex}
  #sidebar{
    width:260px;flex:0 0 260px;background:var(--surface);
    border-right:1px solid var(--border);height:100vh;overflow-y:auto;
    display:flex!important;flex-direction:column;padding:24px 16px;position:sticky;top:0;
  }
  header{display:none}
  #bottom-nav{display:none}
  #app{padding-top:0;flex:1;min-height:100vh}
  #content{padding-bottom:0}
  .screen{padding:24px}
  .sidebar-logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--accent);margin-bottom:4px}
  .sidebar-logo span{font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text-muted);font-weight:300;letter-spacing:0.15em;text-transform:uppercase}
  .sidebar-lang{margin:16px 0;width:100%}
  .sidebar-nav{display:flex;flex-direction:column;gap:4px;flex:1}
  .sidebar-btn{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;
    border:none;background:none;color:var(--text-muted);font-size:14px;
    font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;min-height:44px;
    transition:all 0.15s;
  }
  .sidebar-btn .icon{font-size:18px}
  .sidebar-btn.active{background:rgba(232,160,69,0.12);color:var(--accent)}
  .sidebar-btn:active,.sidebar-btn:hover{background:var(--surface2)}
  .sidebar-streak{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
}
@media(max-width:767px){#sidebar{display:none}}

/* SEPARATOR */
.sep{height:1px;background:var(--border);margin:14px 0}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.badge-green{background:rgba(74,222,128,0.15);color:var(--green)}
.badge-amber{background:rgba(232,160,69,0.15);color:var(--accent)}
.badge-purple{background:rgba(139,92,246,0.15);color:var(--accent2)}

/* CALC */
.calc-display{
  background:var(--surface2);border-radius:10px;padding:12px 16px;
  font-family:'Playfair Display',serif;font-size:28px;text-align:right;
  margin-bottom:10px;min-height:60px;word-break:break-all;
}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-key{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;padding:14px 0;font-size:16px;cursor:pointer;font-family:'DM Sans',sans-serif;
  min-height:44px;text-align:center;
}
.calc-key:active{background:var(--surface)}
.calc-key.op{color:var(--accent);font-weight:600}
.calc-key.eq{background:var(--accent);color:#0f0e17;font-weight:700}
.calc-key.eq:active{background:#c8882e}
</style>
</head>
<body>
<div id="offline-banner">⚡ You're offline — cached content is available. Live features paused.</div>
<div id="sidebar">
  <div class="sidebar-logo">🌍 LinguaLocal<span>Live like a local</span></div>
  <div class="sidebar-lang">
    <select id="lang-select-sidebar" class="input" style="font-size:14px" onchange="setLanguage(this.value)"></select>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
  <div class="sidebar-streak">
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:6px">🔥 Streak</div>
    <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--accent)" id="sidebar-streak-num">0</div>
    <div style="font-size:12px;color:var(--text-muted)">days in a row</div>
  </div>
</div>
<div id="app">
  <header>
    <div class="logo">🌍 LinguaLocal<span>Live like a local</span></div>
    <select id="lang-select" class="input" style="font-size:13px" onchange="setLanguage(this.value)"></select>
  </header>
  <nav id="bottom-nav" aria-label="Main navigation"></nav>
  <main id="content">
    <div class="screen" id="screen-home"></div>
    <div class="screen" id="screen-phrases"></div>
    <div class="screen" id="screen-write"></div>
    <div class="screen" id="screen-speak"></div>
    <div class="screen" id="screen-translate"></div>
    <div class="screen" id="screen-visual"></div>
    <div class="screen" id="screen-currency"></div>
    <div class="screen" id="screen-coach"></div>
    <div class="screen" id="screen-progress"></div>
  </main>
</div>

<!-- Emergency Overlay -->
<div id="emergency-overlay" class="emergency-overlay">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h2 style="color:var(--red)">🆘 Emergency Phrases</h2>
    <button class="btn btn-ghost btn-sm" onclick="closeEmergency()">✕ Close</button>
  </div>
  <div id="emergency-content"></div>
</div>

<button class="sos-btn" onclick="openEmergency()">SOS</button>

<script>
// ============================
// SERVICE WORKER (Blob URL)
// ============================
const SW_CODE = `
const CACHE = 'lingualocal-v1';
const SHELL = ['https://fonts.googleapis.com','https://fonts.gstatic.com','https://cdnjs.cloudflare.com'];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.add('/'))
      .catch(() => {})

  document.documentElement.lang = LANG_DATA[lang].code;
  renderApp();

async function toggleRecording() {
  if (isRecording) {
    if (mediaRecorder) mediaRecorder.stop();
    isRecording = false;
    renderSpeak();
    setTimeout(()=>{showSpeakScore();},800);
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => { stream.getTracks().forEach(t=>t.stop()); };
    mediaRecorder.start();
    isRecording = true;
    renderSpeak();
  } catch(e) {
    alert('Microphone access denied. Please allow microphone access in your browser settings.');
  }
}

async function doTranslate() {
  const text = (document.getElementById('trans-input')||{}).value.trim();

  if (!navigator.onLine) { ra.innerHTML='<div class="card"><div style="color:var(--accent)">⚡ You\'re offline. Translation unavailable — practice phrases instead.</div></div>'; return; }
  if (!apiKey) { showApiKeyPrompt(); return; }
  ra.innerHTML='<div class="card" style="text-align:center"><div class="spinner"></div><div style="margin-top:10px;font-size:13px;color:var(--text-muted)">Translating...</div></div>';

    transResult = res;
    ra.innerHTML=`

        <div class="result-section"><div class="result-label">Original (${transLangFrom})</div><div class="result-text">${text}</div></div>
        <div class="sep"></div>

  } catch(e) { ra.innerHTML=`<div class="card" style="color:var(--red)">Error: ${e.message}</div>`; }

let liveVoiceRec=null;
async function startLiveVoice() {
  const el = document.getElementById('live-voice-result');
  if (el) el.innerHTML='<span style="color:var(--accent)">🎙️ Listening...</span>';
  try {
    const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Rec) { if(el) el.innerHTML='Speech recognition not supported.'; return; }
    liveVoiceRec = new Rec();
    liveVoiceRec.lang = LANG_DATA[transLangFrom].code;
    liveVoiceRec.start();
    liveVoiceRec.onresult = async (e) => {
      const t = e.results[0][0].transcript;
      if (el) el.innerHTML=`<span style="color:var(--text-muted)">"${t}"</span><br><span class="badge badge-purple">Translating...</span>`;

      speak(res, LANG_DATA[transLangTo].code);
      if (el) el.innerHTML=`<strong>${res}</strong><br><span style="color:var(--text-muted);font-size:12px">Said: ${t}</span>`;
    };
  } catch(e) {}
}
function stopLiveVoice() { if (liveVoiceRec) { liveVoiceRec.stop(); liveVoiceRec=null; } }
function startTransVoice() {

    const b64 = visualImageB64.split(',')[1];

    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',

      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mtype,data:b64}},
          {type:'text',text:`Extract all visible text from this image and translate it to ${currentLanguage}. Show: 1) Original text extracted, 2) Translation, 3) Brief context note if helpful (e.g. this is a menu, a warning sign, a lease clause).`}
        ]}]
      })
    });

        <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
          <button class="btn btn-accent btn-sm" onclick="speak('${txt.replace(/'/g,"\\'").slice(0,200)}','${ld.code}')">🔊 Hear Translation</button>
          <button class="btn btn-ghost btn-sm" onclick="savedPhrases.unshift({n:'Visual: '+this.dataset.txt.slice(0,40),e:'Translated'});localStorage.setItem('ll_saved',JSON.stringify(savedPhrases));alert('Saved!');" data-txt="${txt.replace(/"/g,'&quot;').slice(0,80)}">💾 Save</button>
          <button class="btn btn-ghost btn-sm" onclick="doWebShare()">📤 Share</button>
        </div>
      </div>`;
  } catch(e) { vr.innerHTML=`<div class="card" style="color:var(--red)">Error: ${e.message}</div>`; }

async function doWebShare() {

let currencyRates={}, currencyFrom='USD', currencyTo='EUR', calcDisplay='0';
const MAJOR_CURRENCIES = ['USD','EUR','GBP','JPY','AUD','CAD','CHF','CNY','HKD','SGD','KRW','MXN','BRL','INR','THB','VND','AED','MYR'];

  const ld = LANG_DATA[currentLanguage];

    <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px">
      ${!navigator.onLine&&lastUpdated?`📦 Cached — Last updated: ${new Date(parseInt(lastUpdated)).toLocaleTimeString()}`:`Live rates · Auto-refresh 10min`}
    </p>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <select class="input" style="flex:1" onchange="currencyFrom=this.value;renderCurrency()">
        ${MAJOR_CURRENCIES.map(c=>`<option value="${c}" ${c===currencyFrom?'selected':''}>${c}</option>`).join('')}
      </select>
      <button class="swap-btn" onclick="[currencyFrom,currencyTo]=[currencyTo,currencyFrom];renderCurrency()">⇄</button>
      <select class="input" style="flex:1" onchange="currencyTo=this.value;renderCurrency()">
        ${MAJOR_CURRENCIES.map(c=>`<option value="${c}" ${c===currencyTo?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <input class="input" id="currency-amount" type="number" placeholder="Enter amount" value="100" oninput="updateCurrencyResult()" style="margin-bottom:8px">
    <div id="currency-result" style="font-family:'Playfair Display',serif;font-size:28px;color:var(--accent);margin-bottom:12px">
      ${currencyRates[currencyFrom]&&currencyRates[currencyTo]?`= ${((100/currencyRates[currencyFrom])*currencyRates[currencyTo]).toFixed(4)} ${currencyTo}`:'Loading...'}
    </div>
    <div class="quick-amounts">
      ${[10,50,100,500,1000,5000].map(a=>`<button class="amount-btn" onclick="document.getElementById('currency-amount').value=${a};updateCurrencyResult()">${a}</button>`).join('')}
    </div>

    <div class="sep"></div>
    <div class="card">
      <div class="card-title">🌍 ${ld.country} Living Costs</div>
      <div class="rate-row"><span>Average Rent</span><span style="color:var(--accent)">${ld.rent}</span></div>
      <div class="rate-row"><span>Average Meal</span><span style="color:var(--accent)">${ld.meal}</span></div>
      <div class="rate-row"><span>Public Transport</span><span style="color:var(--accent)">${ld.transport}</span></div>
    </div>

    <div class="card">
      <div class="card-title">📊 Live Market Rates (vs USD)</div>
      ${rateKeys.length ? rateKeys.map(k=>{
        const rate = currencyRates[k];
        const change = ((Math.random()-0.48)*2).toFixed(2);
        const cls = parseFloat(change)>=0?'rate-positive':'rate-negative';
        return `<div class="rate-row"><span>${k}</span><span>${rate?rate.toFixed(4):'—'}</span><span class="${cls}">${parseFloat(change)>=0?'+':''}${change}%</span></div>`;
      }).join('') : '<div style="text-align:center;padding:20px"><div class="spinner"></div></div>'}
    </div>

    <div class="sep"></div>
    <div class="card">
      <div class="card-title">🔢 Calculator</div>
      <div class="calc-display" id="calc-display">${calcDisplay}</div>
      <div class="calc-grid">
        ${[['7','8','9','÷'],['4','5','6','×'],['1','2','3','−'],['0','.','=','+']]
          .map(row=>row.map(k=>`<button class="calc-key ${k==='='?'eq':['÷','×','−','+'].includes(k)?'op':''}" onclick="calcPress('${k}')">${k}</button>`).join('')).join('')}
        <button class="calc-key op" style="grid-column:span 2" onclick="calcPress('C')">Clear</button>
        <button class="calc-key op" style="grid-column:span 2" onclick="calcPress('⌫')">⌫</button>
      </div>
    </div>
  `;
}
function updateCurrencyResult() {
  const amt = parseFloat(document.getElementById('currency-amount').value) || 0;
  const r = document.getElementById('currency-result');
  if (!r) return;
  if (currencyRates[currencyFrom]&&currencyRates[currencyTo]) {
    const conv = (amt/currencyRates[currencyFrom])*currencyRates[currencyTo];
    r.textContent = `= ${conv.toFixed(4)} ${currencyTo}`;
  }
}
let calcExpr='';
function calcPress(k) {
  if (k==='C') { calcExpr=''; calcDisplay='0'; }
  else if (k==='⌫') { calcExpr=calcExpr.slice(0,-1)||''; calcDisplay=calcExpr||'0'; }
  else if (k==='=') {
    try {
      const expr = calcExpr.replace(/÷/g,'/').replace(/×/g,'*').replace(/−/g,'-');
      const res = Function('return '+expr)();
      calcDisplay = String(parseFloat(res.toFixed(8)));
      calcExpr = calcDisplay;
    } catch(e) { calcDisplay='Error'; calcExpr=''; }
  } else { calcExpr += k; calcDisplay = calcExpr; }
  const d = document.getElementById('calc-display');
  if (d) d.textContent = calcDisplay;
}
async function initCurrency() {
  const cached = localStorage.getItem('ll_currency_rates');
  const cacheTime = localStorage.getItem('ll_currency_time');
  const now = Date.now();
  if (cached && cacheTime && (now-parseInt(cacheTime))<600000) {
    currencyRates = JSON.parse(cached);
    renderCurrency(); return;
  }
  if (!navigator.onLine) {
    if (cached) { currencyRates = JSON.parse(cached); }
    renderCurrency(); return;
  }
  try {
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    currencyRates = data.rates;
    localStorage.setItem('ll_currency_rates', JSON.stringify(currencyRates));
    localStorage.setItem('ll_currency_time', String(now));
    renderCurrency();
  } catch(e) {
    if (cached) currencyRates = JSON.parse(cached);
    renderCurrency();
  }
}

function initCoach() { renderCoach(); }
function clearCoachHistory() { coachHistory=[]; renderCoach(); }
function quickCoachMsg(msg) { const inp=document.getElementById('coach-input'); if(inp) inp.value=msg; sendCoachMsg(); }
async function sendCoachMsg() {
  const inp = document.getElementById('coach-input');
  if (!inp) return;
  const msg = inp.value.trim();
  if (!msg) return;
  if (!apiKey) { showApiKeyPrompt(); return; }
  inp.value='';
  const ld = LANG_DATA[currentLanguage];
  coachHistory.push({role:'user',content:msg});
  const typing = document.getElementById('coach-typing');
  if (typing) typing.style.display='block';
  const msgs = document.getElementById('chat-messages');
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
  const systemPrompt = `You are ${ld.coachName}, a friendly and encouraging ${currentLanguage} language coach. The user is learning ${currentLanguage} for relocation and expat daily life abroad. Respond primarily in ${currentLanguage} with natural, authentic language. After your ${currentLanguage} response, provide an English translation/explanation in parentheses so the learner can understand. Keep responses concise (2-4 sentences). Be warm, practical, and focus on real-life situations like housing, food, transport, and fitting in locally.`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:500,
        system:systemPrompt,
        messages:coachHistory.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({role:m.role,content:m.content}))
      })
    });
    if (typing) typing.style.display='none';
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content[0].text;
    const match = reply.match(/\(([^)]+)\)\s*$/);
    coachHistory.push({role:'assistant',content:reply.replace(/\([^)]+\)\s*$/,'').trim(), translation:match?match[1]:''});
    renderCoach();
    setTimeout(()=>{ const el=document.getElementById('chat-messages'); if(el)el.scrollTop=el.scrollHeight; },100);
  } catch(e) {
    if (typing) typing.style.display='none';
    if (!navigator.onLine) {
      coachHistory.push({role:'assistant',content:'⚡ You\'re offline. Coach is unavailable — practice phrases instead.',translation:''});
    } else {
      coachHistory.push({role:'assistant',content:`Error: ${e.message}`,translation:''});
    }
    renderCoach();
  }
}
function saveApiKey() {
  const inp = document.getElementById('api-key-input');
  if (!inp||!inp.value.trim()) return;
  apiKey = inp.value.trim();
  localStorage.setItem('ll_apikey',apiKey);
  renderCoach();
}
function showApiKeyPrompt() { switchTab('coach'); }
async function callClaude(prompt) {
  if (!apiKey) throw new Error('API key required');
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

function speak(text, lang) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang; u.rate = 0.85; u.pitch = 1;
  speechSynthesis.speak(u);
}
